name: Build SAVIO Android

on:
  push:
    branches: [main, savio-android]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Test and build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK
        run: sdkmanager "platform-tools" "platforms;android-37" "build-tools;36.0.0"

      - name: Set up Gradle 9.3.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.3.1"
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Unit tests
        run: gradle --no-daemon :app:testDebugUnitTest

      - name: Android lint
        run: gradle --no-daemon :app:lintDebug

      - name: Build installable debug APK
        run: gradle --no-daemon :app:assembleDebug

      - name: Build release App Bundle
        run: gradle --no-daemon :app:bundleRelease

      - name: Checksums
        run: |
          sha256sum app/build/outputs/apk/debug/app-debug.apk > SAVIO-Android-SHA256.txt
          sha256sum app/build/outputs/bundle/release/app-release.aab >> SAVIO-Android-SHA256.txt

      - name: Upload Android test package
        uses: actions/upload-artifact@v4
        with:
          name: SAVIO-Android-Test-Package
          if-no-files-found: error
          retention-days: 30
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/bundle/release/app-release.aab
            SAVIO-Android-SHA256.txt
