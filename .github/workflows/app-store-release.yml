name: App Store release

on:
  workflow_dispatch:
    inputs:
      upload_to_app_store:
        description: Upload the exported IPA to App Store Connect
        required: true
        type: boolean
        default: true

concurrency:
  group: app-store-release
  cancel-in-progress: false

jobs:
  archive-and-upload:
    name: Sign, archive and upload VAULT
    runs-on: macos-15
    timeout-minutes: 45
    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      ASC_PRIVATE_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY_BASE64 }}
      DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE_BASE64 }}
      DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required secrets
        shell: bash
        run: |
          set -euo pipefail
          required=(
            APPLE_TEAM_ID ASC_KEY_ID ASC_ISSUER_ID ASC_PRIVATE_KEY_BASE64
            DISTRIBUTION_CERTIFICATE_BASE64 DISTRIBUTION_CERTIFICATE_PASSWORD KEYCHAIN_PASSWORD
          )
          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing GitHub secret: $name" >&2
              exit 1
            fi
          done

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Install signing certificate and API key
        shell: bash
        run: |
          set -euo pipefail
          CERTIFICATE_PATH="$RUNNER_TEMP/distribution.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/vault-signing.keychain-db"
          API_KEY_DIR="$HOME/.appstoreconnect/private_keys"
          API_KEY_PATH="$API_KEY_DIR/AuthKey_${ASC_KEY_ID}.p8"

          echo "$DISTRIBUTION_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          mkdir -p "$API_KEY_DIR"
          echo "$ASC_PRIVATE_KEY_BASE64" | base64 --decode > "$API_KEY_PATH"
          chmod 600 "$API_KEY_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$DISTRIBUTION_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "API_KEY_PATH=$API_KEY_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Archive signed app
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project VAULT.xcodeproj \
            -scheme VAULT \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/VAULT.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            CURRENT_PROJECT_VERSION="${GITHUB_RUN_NUMBER}"

      - name: Export IPA
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/VAULT.xcarchive" \
            -exportPath "$RUNNER_TEMP/VAULT-export" \
            -exportOptionsPlist .github/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Validate IPA
        if: ${{ inputs.upload_to_app_store }}
        shell: bash
        run: |
          set -euo pipefail
          IPA_PATH="$(find "$RUNNER_TEMP/VAULT-export" -name '*.ipa' -print -quit)"
          test -n "$IPA_PATH"
          xcrun altool --validate-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      - name: Upload to App Store Connect
        if: ${{ inputs.upload_to_app_store }}
        shell: bash
        run: |
          set -euo pipefail
          IPA_PATH="$(find "$RUNNER_TEMP/VAULT-export" -name '*.ipa' -print -quit)"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VAULT-App-Store-${{ github.run_number }}
          path: |
            ${{ runner.temp }}/VAULT-export/*.ipa
            ${{ runner.temp }}/VAULT.xcarchive/dSYMs
          if-no-files-found: error
          retention-days: 30

      - name: Clean signing keychain
        if: ${{ always() }}
        shell: bash
        run: |
          if [[ -n "${KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
          rm -rf "$HOME/.appstoreconnect/private_keys" || true
