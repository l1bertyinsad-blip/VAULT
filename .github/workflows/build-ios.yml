name: Build iOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build and test VAULT
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Build simulator app
        run: |
          xcodebuild build \
            -project VAULT.xcodeproj \
            -scheme VAULT \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO

      - name: Package for Appetize
        run: |
          cd DerivedData/Build/Products/Debug-iphonesimulator
          ditto -c -k --sequesterRsrc --keepParent VAULT.app VAULT-Appetize.zip

      - name: Upload Appetize artifact
        uses: actions/upload-artifact@v4
        with:
          name: VAULT-Appetize
          path: DerivedData/Build/Products/Debug-iphonesimulator/VAULT-Appetize.zip
          if-no-files-found: error
          retention-days: 14

      - name: Run unit and UI tests
        run: |
          xcodebuild test \
            -project VAULT.xcodeproj \
            -scheme VAULT \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro,OS=26.0' \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO
