name: Build VAULT for iOS Simulator

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build and test VAULT
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Download project
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build application
        run: |
          set -o pipefail

          xcodebuild \
            -project VAULT.xcodeproj \
            -scheme VAULT \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build | tee xcodebuild.log

      - name: Package application for Appetize
        run: |
          APP_PATH="DerivedData/Build/Products/Debug-iphonesimulator/VAULT.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "VAULT.app was not found"
            exit 1
          fi

          ditto \
            -c \
            -k \
            --sequesterRsrc \
            --keepParent \
            "$APP_PATH" \
            "VAULT-Appetize.zip"

      - name: Upload simulator application
        uses: actions/upload-artifact@v4
        with:
          name: VAULT-Simulator-Build
          path: VAULT-Appetize.zip
          retention-days: 7
          if-no-files-found: error

      - name: Select simulator
        id: simulator
        run: |
          DEVICE_ID=$(xcrun simctl list devices available -j | python3 -c '
          import json
          import sys

          data = json.load(sys.stdin)

          for devices in data["devices"].values():
              for device in devices:
                  if device["name"].startswith("iPhone"):
                      print(device["udid"])
                      raise SystemExit(0)

          raise SystemExit("No available iPhone simulator found")
          ')

          echo "device_id=$DEVICE_ID" >> "$GITHUB_OUTPUT"
          echo "Selected simulator: $DEVICE_ID"

      - name: Run unit and UI tests
        run: |
          set -o pipefail

          xcodebuild \
            -project VAULT.xcodeproj \
            -scheme VAULT \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.device_id }}" \
            -derivedDataPath DerivedData \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            test | tee xcodebuild-tests.log

      - name: Upload diagnostic files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: VAULT-Build-Logs
          path: |
            xcodebuild.log
            xcodebuild-tests.log
            TestResults.xcresult
          retention-days: 7
          if-no-files-found: ignore
