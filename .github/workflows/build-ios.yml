name: Build iOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build and test VAULT
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Build simulator app
        run: |
          xcodebuild build \
            -project VAULT.xcodeproj \
            -scheme VAULT \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO

      - name: Package for Appetize
        run: |
          cd DerivedData/Build/Products/Debug-iphonesimulator
          ditto -c -k --sequesterRsrc --keepParent VAULT.app VAULT-Appetize.zip

      - name: Upload Appetize artifact
        uses: actions/upload-artifact@v4
        with:
          name: VAULT-Appetize
          path: DerivedData/Build/Products/Debug-iphonesimulator/VAULT-Appetize.zip
          if-no-files-found: error
          retention-days: 14

      - name: Create test simulator
        id: simulator
        shell: bash
        run: |
          set -euo pipefail
          RUNTIME_ID="$(xcrun simctl list runtimes available -j | python3 -c '
          import json, re, sys
          runtimes = [r for r in json.load(sys.stdin)["runtimes"] if r.get("isAvailable") and r.get("name", "").startswith("iOS ")]
          runtimes.sort(key=lambda r: tuple(map(int, re.findall(r"\d+", r["name"]))), reverse=True)
          print(runtimes[0]["identifier"])
          ')"
          DEVICE_TYPE_ID="$(xcrun simctl list devicetypes -j | python3 -c '
          import json, sys
          devices = json.load(sys.stdin)["devicetypes"]
          preferred = ["iPhone 17 Pro Max", "iPhone 17 Pro", "iPhone 16 Pro Max", "iPhone 16 Pro", "iPhone SE (3rd generation)"]
          by_name = {d["name"]: d["identifier"] for d in devices}
          print(next(by_name[name] for name in preferred if name in by_name))
          ')"
          DEVICE_ID="$(xcrun simctl create 'VAULT CI iPhone' "$DEVICE_TYPE_ID" "$RUNTIME_ID")"
          xcrun simctl boot "$DEVICE_ID"
          xcrun simctl bootstatus "$DEVICE_ID" -b
          echo "device_id=$DEVICE_ID" >> "$GITHUB_OUTPUT"

      - name: Run unit and UI tests
        run: |
          xcodebuild test \
            -project VAULT.xcodeproj \
            -scheme VAULT \
            -destination 'platform=iOS Simulator,id=${{ steps.simulator.outputs.device_id }}' \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO
